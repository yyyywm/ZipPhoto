name: Build and Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest  # 明确使用 x64 版本

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --noconfirm --onefile --console --name ZipPhoto main.py
          dir dist

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZipPhoto-exe
          path: dist/ZipPhoto.exe

  test:
    runs-on: windows-2019
    needs: build

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: ZipPhoto-exe

      - name: Run test
        run: |
          .\ZipPhoto.exe --version

  release:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: ZipPhoto-exe

      - name: Read version
        id: version
        run: echo "VERSION=$(cat version.txt)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ZipPhoto.exe
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ZipPhoto ${{ steps.version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
