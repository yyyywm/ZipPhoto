name: Build and Release

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\pip\Cache
            ~\AppData\Local\Programs\Python\Python311\Lib\site-packages
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Read version
        id: version
        run: echo "VERSION=$(cat version.txt)" >> $GITHUB_OUTPUT

      - name: Build executable
        run: pyinstaller --onefile --name ZipPhoto_${{ steps.version.outputs.VERSION }} main.py

      - name: Create Git Tag via API
        run: |
          TAG_NAME="${{ steps.version.outputs.VERSION }}"
          SHA=$(git rev-parse HEAD)
          echo "Creating tag $TAG_NAME for commit $SHA"

          # Create tag object
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/${{ github.repository }}/git/tags \
            -d "{
              \"tag\": \"$TAG_NAME\",
              \"message\": \"Release $TAG_NAME\",
              \"object\": \"$SHA\",
              \"type\": \"commit\",
              \"tagger\": {
                \"name\": \"github-actions[bot]\",
                \"email\": \"github-actions[bot]@users.noreply.github.com\"
              }
            }"

          # Create tag reference
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/git/refs \
            -d "{
              \"ref\": \"refs/tags/$TAG_NAME\",
              \"sha\": \"$SHA\"
            }"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
